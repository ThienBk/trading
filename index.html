<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Dashboard - Clear Separation</title>
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --primary-green: #22c55e;
            --danger-red: #ef4444;
            --accent-blue: #3b82f6;
            --item-bg: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100vh; overflow: hidden; 
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
        }

        .dashboard { display: flex; flex-direction: column; height: 100vh; padding: 10px; gap: 10px; }

        /* Header Bar */
        .status-header {
            display: grid; grid-template-columns: 1fr 400px; gap: 15px;
            background: var(--card-bg); padding: 12px; border-radius: 12px; border: 1px solid #334155;
            flex-shrink: 0;
        }

        .buy-zone {
            background: #000; height: 55px; border-radius: 8px;
            position: relative; border: 2px solid #334155; overflow: hidden;
        }

        #progress-bar {
            height: 100%; width: 0%; transition: all 0.4s ease-out;
            position: absolute; left: 50%; z-index: 1;
        }
        #progress-bar.positive { background: var(--primary-green); }
        #progress-bar.negative { background: var(--danger-red); left: auto; right: 50%; }

        .buy-label {
            position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%);
            font-size: 1.8rem; font-weight: 900; color: #fff; z-index: 5;
            text-shadow: 2px 2px 4px #000;
        }

        /* Lưới 2x2 */
        .timeframe-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: 1fr 1fr;    
            gap: 15px; flex-grow: 1; overflow: hidden; 
        }

        .tf-column {
            background: var(--card-bg); border-radius: 12px; border: 1px solid #475569;
            display: flex; flex-direction: column; padding: 12px; overflow: hidden;
        }

        .tf-header-box {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }

        .tf-header { color: var(--accent-blue); font-weight: 900; font-size: 1rem; text-transform: uppercase; }

        .tf-reset-btn {
            background: #334155; border: 1px solid #475569; color: #fff;
            font-size: 0.65rem; padding: 3px 8px; border-radius: 4px; cursor: pointer;
        }

        /* KHU VỰC ĐIỀU KHIỂN (ALL BUY/SELL) - Làm cho khác biệt hẳn */
        .quick-actions { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #334155; /* GẠCH NGANG PHÂN CÁCH ĐÂY BRO */
        }
        .qa-btn {
            padding: 12px; border: none; border-radius: 8px; font-size: 0.85rem; font-weight: 800;
            cursor: pointer; color: #fff; text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3); /* Tạo độ nổi cho nút */
            transition: transform 0.1s;
        }
        .qa-btn:active { transform: translateY(3px); box-shadow: none; }
        .qa-buy { background: #15803d; border: 1px solid #22c55e; }
        .qa-sell { background: #b91c1c; border: 1px solid #ef4444; }

        /* Indicators List - Làm mỏng và thoáng hơn */
        .indicator-list { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; overflow-y: auto; 
        }
        
        .indicator-item {
            background: var(--item-bg); border-radius: 4px;
            overflow: hidden; border: 1px solid #1e293b; position: relative;
            height: 38px; /* Giảm nhẹ chiều cao để tạo khoảng trống */
        }

        .ind-title {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 0.7rem; font-weight: 600; pointer-events: none; z-index: 3;
            width: 80%; text-align: center; color: #94a3b8; /* Chữ mặc định mờ hơn nút All */
        }

        .side-label {
            position: absolute; font-size: 0.5rem; font-weight: 900;
            top: 2px; opacity: 0.2; z-index: 4;
        }
        .label-buy { left: 5px; color: var(--primary-green); }
        .label-sell { right: 5px; color: var(--danger-red); }

        /* Highlight khi chọn - Làm rực lên để nhận diện */
        .indicator-item.is-buy { background: #064e3b !important; border-color: var(--primary-green); }
        .indicator-item.is-buy .ind-title { color: #fff; }
        .indicator-item.is-sell { background: #7f1d1d !important; border-color: var(--danger-red); }
        .indicator-item.is-sell .ind-title { color: #fff; }

        .split-container { display: flex; height: 100%; }
        .split-half { flex: 1; cursor: pointer; z-index: 2; }
        .split-half input { display: none; }
        
        .half-buy { border-right: 1px solid rgba(255,255,255,0.05); }

        /* Control Panel */
        .side-panel { display: flex; align-items: center; gap: 10px; }
        .m-group { display: flex; gap: 5px; flex: 1; }
        .m-btn { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #475569; background: #0f172a; cursor: pointer; font-size: 0.8rem; font-weight: bold; color: #fff; }
        .m-btn.active { background: var(--accent-blue); }
        .clear-btn { padding: 12px 20px; background: var(--danger-red); border: none; border-radius: 8px; color: white; font-weight: 800; cursor: pointer; }

    </style>
</head>
<body>

<div class="dashboard">
    <div class="status-header">
        <div class="buy-zone">
            <div id="progress-bar"></div>
            <div class="buy-label">CONFIDENCE: <span id="percent-text">0</span>%</div>
        </div>
        <div class="side-panel">
            <div class="m-group">
                <div class="m-btn" data-val="20" onclick="setMacro(this)">VĨ MÔ +</div>
                <div class="m-btn active" data-val="0" id="m-neutral" onclick="setMacro(this)">TRUNG LẬP</div>
                <div class="m-btn" data-val="-20" onclick="setMacro(this)">VĨ MÔ -</div>
            </div>
            <button class="clear-btn" onclick="clearAll()">❌ RESET ALL</button>
        </div>
    </div>

    <div class="timeframe-grid" id="main-grid"></div>
</div>

<script>
    const tfs = [
        { name: "KHUNG 1H (1%)", weight: 1.0, id: "1h" },
        { name: "KHUNG 4H (2%)", weight: 2.0, id: "4h" },
        { name: "KHUNG 1D (4%)", weight: 4.0, id: "1d" },
        { name: "KHUNG 1W (3%)", weight: 3.0, id: "1w" }
    ];

    const indicators = ["Xu hướng", "RSI", "MACD", "MA20/50", "Nến đảo chiều", "Volume", "Hỗ trợ/KC", "Bollinger", "Fibo", "Stoch"];

    function render() {
        const grid = document.getElementById('main-grid');
        tfs.forEach(tf => {
            let html = `
                <div class="tf-column" id="col-${tf.id}">
                    <div class="tf-header-box">
                        <div class="tf-header">${tf.name}</div>
                        <button class="tf-reset-btn" onclick="resetTimeframe('${tf.id}')">Reset ${tf.id.toUpperCase()}</button>
                    </div>
                    <div class="quick-actions">
                        <button class="qa-btn qa-buy" onclick="bulkCheck('${tf.id}', 'buy')">ALL BUY</button>
                        <button class="qa-btn qa-sell" onclick="bulkCheck('${tf.id}', 'sell')">ALL SELL</button>
                    </div>
                    <div class="indicator-list">
            `;

            indicators.forEach((ind, idx) => {
                const groupName = `group_${tf.id}_${idx}`;
                html += `
                    <div class="indicator-item" id="item_${tf.id}_${idx}">
                        <span class="side-label label-buy">B</span>
                        <span class="side-label label-sell">S</span>
                        <div class="ind-title">${ind}</div>
                        <div class="split-container">
                            <label class="split-half half-buy">
                                <input type="radio" name="${groupName}" value="buy" onchange="calcHighlight('${tf.id}', ${idx}, 'buy')">
                            </label>
                            <label class="split-half half-sell">
                                <input type="radio" name="${groupName}" value="sell" onchange="calcHighlight('${tf.id}', ${idx}, 'sell')">
                            </label>
                        </div>
                    </div>
                `;
            });
            html += `</div></div>`;
            grid.innerHTML += html;
        });
    }

    let macroBonus = 0;

    function calcHighlight(tfId, idx, type) {
        const item = document.getElementById(`item_${tfId}_${idx}`);
        item.classList.remove('is-buy', 'is-sell');
        if (type === 'buy') item.classList.add('is-buy');
        else if (type === 'sell') item.classList.add('is-sell');
        calc();
    }

    function bulkCheck(tfId, type) {
        document.querySelectorAll(`input[name^="group_${tfId}_"]`).forEach((radio, idx) => {
            if (radio.value === type) {
                radio.checked = true;
                const realIdx = Math.floor(idx / 2);
                const item = document.getElementById(`item_${tfId}_${realIdx}`);
                item.classList.remove('is-buy', 'is-sell');
                item.classList.add(type === 'buy' ? 'is-buy' : 'is-sell');
            }
        });
        calc();
    }

    function resetTimeframe(tfId) {
        document.querySelectorAll(`input[name^="group_${tfId}_"]`).forEach(r => r.checked = false);
        document.querySelectorAll(`#col-${tfId} .indicator-item`).forEach(item => {
            item.classList.remove('is-buy', 'is-sell');
        });
        calc();
    }

    function setMacro(el) {
        document.querySelectorAll('.m-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        macroBonus = parseInt(el.getAttribute('data-val'));
        calc();
    }

    function calc() {
        let total = 0;
        tfs.forEach(tf => {
            document.querySelectorAll(`input[name^="group_${tf.id}_"]:checked`).forEach(r => {
                total += (r.value === 'buy' ? tf.weight : -tf.weight);
            });
        });
        total += macroBonus;
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('percent-text');
        text.innerText = total.toFixed(0);
        if (total >= 0) {
            bar.className = 'positive';
            bar.style.left = "50%"; bar.style.right = "auto";
            bar.style.width = (Math.min(total, 100) / 2) + "%";
        } else {
            bar.className = 'negative';
            bar.style.left = "auto"; bar.style.right = "50%";
            bar.style.width = (Math.min(Math.abs(total), 100) / 2) + "%";
        }
    }

    function clearAll() {
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        document.querySelectorAll('.indicator-item').forEach(item => item.classList.remove('is-buy', 'is-sell'));
        setMacro(document.getElementById('m-neutral'));
    }

    render();
</script>
</body>
</html>
